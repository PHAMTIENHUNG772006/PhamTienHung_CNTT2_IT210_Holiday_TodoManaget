<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Todo Manager</h2>

    <div class="text-right mb-3">
        <button class="btn btn-primary" onclick="toggleForm()">
            ➕ Thêm công việc
        </button>
    </div>

    <div id="todoForm"
         class="card p-3 mb-4"
         th:style="${hasError} or ${showForm} ? 'display:block' : 'display:none'">
        <h5 th:text="${todo.id} != null ? 'Cập nhật công việc' : 'Thêm công việc'"></h5>

        <form th:action="@{/add}" method="post" th:object="${todo}">

            <input type="hidden" th:field="*{id}" />
            <div class="form-group">
                <label>Nội dung</label>
                <input type="text" class="form-control" th:field="*{content}">
                <small class="text-danger" th:errors="*{content}"></small>
            </div>

            <div class="form-group">
                <label>Ngày hết hạn</label>
                <input type="date" class="form-control" th:field="*{dueDate}">
                <small class="text-danger" th:errors="*{dueDate}"></small>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Trạng thái</label>
                    <select class="form-control" th:field="*{status}">
                        <option value="TODO">TODO</option>
                        <option value="DONE">DONE</option>
                    </select>
                </div>

                <div class="form-group col-md-6">
                    <label>Độ ưu tiên</label>
                    <select class="form-control" th:field="*{priority}">
                        <option value="LOW">LOW</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="HIGH">HIGH</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-success">Lưu</button>
        </form>
    </div>


    <table class="table table-bordered table-striped table-hover text-center">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nội dung</th>
            <th>Hạn</th>
            <th>Trạng thái</th>
            <th>Ưu tiên</th>
            <th>Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="t : ${todos}">
            <td th:text="${t.id}"></td>
            <td th:text="${t.content}"></td>
            <td th:text="${t.dueDate}"></td>
            <td>
                <span class="badge"
                      th:classappend="${t.status == 'DONE'} ? 'badge-success' : 'badge-warning'"
                      th:text="${t.status}">
                </span>
            </td>

            <td>
                <span class="badge"
                      th:classappend="
                        ${t.priority == 'HIGH'} ? 'badge-danger' :
                        (${t.priority == 'MEDIUM'} ? 'badge-info' : 'badge-secondary')"
                      th:text="${t.priority}">
                </span>
            </td>
            <td>
                <a th:href="@{/edit/{id}(id=${t.id})}">Sửa</a>
                <a th:href="@{/delete/{id}(id=${t.id})}"
                   onclick="return confirm('Bạn có chắc muốn xóa task này?');">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<script>
    function toggleForm() {
        const form = document.getElementById("todoForm");
        form.style.display = (form.style.display === "none") ? "block" : "none";
    }
</script>


<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
